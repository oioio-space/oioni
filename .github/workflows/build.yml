name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: go build (linux/arm64)
    runs-on: ubuntu-latest
    env:
      GOOS: linux
      GOARCH: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work

      - name: Build cmd/oioni (cross-compile ARM64)
        working-directory: cmd/oioni
        run: go build -o /dev/null ./...
